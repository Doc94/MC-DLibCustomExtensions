name: Java CI PR

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: ☑️ Checkout
        uses: actions/checkout@v6
      - name: ☕ Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'
          cache: 'gradle'
      - name: 🏗️ Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: 🏗️ Build with Gradle
        run: ./gradlew build --stacktrace
